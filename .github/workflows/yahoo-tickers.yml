name: Collect Yahoo Finance tickers

on:
  workflow_dispatch:

  schedule:
    - cron: "0 12 * * 1-5"
      timezone: "America/New_York"

permissions:
  contents: write

concurrency:
  group: yahoo-finance-ticker-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python script.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git add data/trending.csv data/most_active.csv
      
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Append Yahoo Finance ticker data"
      
            # Get the latest remote changes before pushing
            git pull --rebase origin main
      
            # Push the rebased commit
            git push origin HEAD:main
          fi
