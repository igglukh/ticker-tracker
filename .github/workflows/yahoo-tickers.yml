name: Collect Yahoo Finance tickers

on:
  workflow_dispatch:

  schedule:
    # 12:00 New York time during daylight saving time = 16:00 UTC
    # 12:00 New York time during standard time = 17:00 UTC
    - cron: "0 16 * * 1-5"

permissions:
  contents: write

concurrency:
  group: yahoo-finance-ticker-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python script.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/trending.csv data/most_active.csv

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi

          git commit -m "Append Yahoo Finance ticker data"

          git fetch origin main
          git rebase origin/main

          git push origin HEAD:main
