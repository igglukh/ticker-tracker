name: Collect Yahoo Finance tickers

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"
      timezone: "America/New_York"

permissions:
  contents: write

concurrency:
  group: yahoo-finance-ticker-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Synchronize with latest main
        run: |
          set -euxo pipefail
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python script.py

      - name: Commit updated CSV files
        run: |
          set -euxo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git status --short

          git add data/trending.csv data/most_active.csv

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi

          git commit -m "Append Yahoo Finance ticker data"

          git pull --rebase origin main
          git push origin HEAD:main
